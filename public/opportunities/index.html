<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>All opportunities — alpha.gov.bb</title>
<link rel="stylesheet" href="https://unpkg.com/@govtech-bb/styles@1.0.0-alpha.16/dist/styles.css" />
<link rel="stylesheet" href="/shared/styles.css" />
</head>
<body class="govbb-page">
  <div>
    <div class="govbb-official-banner">
      <div class="govbb-container govbb-official-banner__inner">
        <div class="govbb-official-banner__crest">
          <img class="govbb-official-banner__icon" src="https://unpkg.com/@govtech-bb/styles@1.0.0-alpha.16/dist/assets/images/govbb-creast.svg" alt="" />
        </div>
        <div class="govbb-official-banner__text"><span>Official government website</span></div>
      </div>
    </div>

    <div class="govbb-status-banner govbb-status-banner--alpha" role="status" aria-live="polite">
      <div class="govbb-container"><p>This page is in <a class="govbb-link govbb-link--secondary" href="#">Alpha</a>.</p></div>
    </div>

    <header class="govbb-header">
      <div class="govbb-container govbb-header__inner site-header">
        <a href="/" aria-label="Go to the homepage">
          <img class="govbb-header__logo" src="https://unpkg.com/@govtech-bb/styles@1.0.0-alpha.16/dist/assets/images/govbb-logo.svg" alt="GOVBB" />
        </a>
        <nav class="site-nav" aria-label="Primary">
          <a class="site-nav__link" href="/">Chat</a>
          <a class="site-nav__link" href="/opportunities/" aria-current="page">Browse</a>
        </nav>
      </div>
    </header>
  </div>

  <main class="govbb-page__main">
    <div class="govbb-container app-page">
      <nav class="govbb-breadcrumbs" aria-label="Breadcrumb">
        <ol class="govbb-breadcrumbs__list">
          <li class="govbb-breadcrumbs__item"><a class="govbb-breadcrumbs__link" href="/">Home</a></li>
          <li class="govbb-breadcrumbs__item" aria-current="page">All opportunities</li>
        </ol>
      </nav>

      <div class="app-page__heading">
        <span class="app-page__service-title govbb-text-body">Opportunities Service</span>
        <h1 class="govbb-text-display">All opportunities</h1>
        <p class="govbb-text-body">Browse every programme. Use the search to filter by name, tag, or category.</p>
      </div>

      <search aria-label="Search opportunities">
        <form class="govbb-search" id="search-form" role="search" onsubmit="event.preventDefault()">
          <label class="govbb-search__label" for="search-input">Search opportunities</label>
          <input class="govbb-search__input" id="search-input" type="search" name="q" placeholder="e.g. arts, scholarship, youth" autocomplete="off" />
          <button class="govbb-search__button" type="submit">Search</button>
        </form>
      </search>

      <p class="govbb-text-caption" id="count" aria-live="polite"></p>

      <ul id="list" class="govbb-list opps-list" aria-live="polite"></ul>
    </div>
  </main>

  <footer class="govbb-footer">
    <div class="govbb-container govbb-footer__inner">
      <nav class="govbb-footer__nav" aria-label="Footer">
        <a class="govbb-footer__link" href="/">Home</a>
        <a class="govbb-footer__link" href="/matcher/">Chat</a>
        <a class="govbb-footer__link" href="/admin/">Admin</a>
      </nav>
      <hr class="govbb-footer__divider" aria-hidden="true" />
      <div class="govbb-footer__end">
        <img class="govbb-footer__coat" src="https://unpkg.com/@govtech-bb/styles@1.0.0-alpha.16/dist/assets/images/govbb-creast.svg" alt="Government of Barbados Coat of Arms" />
        <p class="govbb-footer__copy">© 2026 Government of Barbados</p>
      </div>
    </div>
  </footer>

  <script src="/opportunities/app.js"></script>
</body>
</html>
